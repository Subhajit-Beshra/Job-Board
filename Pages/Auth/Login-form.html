<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Board | Login</title>
    <link rel="stylesheet" href="output.css">
    <link rel="icon" href="/Assets/job-board.jpg" type="image/jpg">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-blue-50 to-indigo-100">
    <!-- toast -->
    <div class="toast">
        <div class="success hidden fixed top-5 right-7 flex flex-row items-center gap-2 p-2 rounded bg-white shadow-lg text-gray-800 transform-x-full transition-transform duration-300 ease-in-out">
            <div class="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center">
                <i class="ri-check-line text-white text-xl"></i>
            </div>
            <p></p>
        </div>
        <div class="error hidden fixed top-5 right-7 flex flex-row items-center gap-2 p-2 rounded bg-white shadow-lg text-gray-800">
            <div class="w-5 h-5 rounded-full bg-red-500 flex items-center justify-center">
                <i class="ri-close-line text-white text-xl"></i>
            </div>
            <p></p>
        </div>
        <div class="reset-psd hidden fixed top-5 right-7 flex flex-row items-center gap-2 p-2 rounded bg-white shadow-lg text-gray-800">
            <div class="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center">
                <i class="ri-check-line text-white text-xl"></i>
            </div>
            <p></p>
        </div>
    </div>
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- title -->
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Login</h1>
            <p class="text-gray-600 mb-6">Welcome back to Job Board</p>
            <!-- fomr -->
            <form action="" class="space-y-4">
                <div class="flex items-center border border-gray-300 rounded-lg px-4 py-3 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition">
                    <div class="text-gray-500 mr-3">
                        <i class="ri-mail-open-line text-xl"></i>
                    </div>
                    <!-- email -->
                    <input type="email" placeholder="Email Address" class="w-full outline-none bg-transparent text-gray-700 placeholder-gray-500" />
                </div>
                <div class="flex items-center border border-gray-300 rounded-lg px-4 py-3 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition relative">
                    <div class="text-gray-500 mr-3">
                        <i class="ri-git-repository-private-line text-xl"></i>
                    </div>
                    <!-- password -->
                    <input id="password" type="password" placeholder="Password" class="w-full outline-none bg-transparent text-gray-700 placeholder-gray-500 pr-10" />
                    <button type="button" id="toggle-password" class="absolute right-3 text-gray-500 hover:text-gray-800 focus:outline-none">
                        <i class="ri-eye-off-line text-xl"></i>
                    </button>
                </div>
                <!-- button -->
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200 mt-6">Sign in</button>
            </form>
            <div class="mt-6 space-y-2 text-sm text-center">
                <p class="text-gray-700">Don't have an account? <a href="Sign-Up.html" class="text-indigo-600 hover:text-indigo-700 font-semibold">Sign up</a></p>
                <p class="text-gray-700">Forgot password? <a href="#" id = "reset-password"class="text-indigo-600 hover:text-indigo-700 font-semibold">Reset Password</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="../../JS/Login-Form.js"></script>
</body>
</html>
