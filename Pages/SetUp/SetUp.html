<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile SetUp</title>
    <link rel="stylesheet" href="../../CSS/output.css">
    <link rel="icon" href="/Assets/job-board.jpg" type="image/jpg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet"></noscript>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center items-center px-4 py-10 sm:px-6 lg:px-8 bg-gradient-to-br from-blue-50 to-indigo-100">

    <!-- toast -->
     <div class="toast">
        <div class="success hidden fixed top-5 right-7 flex flex-row items-center gap-2 p-2 rounded bg-white shadow-lg text-gray-800">
            <div class="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center">
                <i class="ri-check-line text-white text-xl"></i>
            </div>
            <p></p>
        </div>
     </div>

    <div class="mx-auto max-w-2xl rounded-2xl bg-white p-6 shadow-lg sm:p-8">
        <h1 class="mb-6 text-2xl font-semibold text-gray-800">Let's get to know you better.</h1>

        <form class="space-y-4" action="#" method="post">
            <div>
                <label for="name" class="mb-2 block text-sm font-medium text-gray-700">Full name</label>
                <input id="name" type="text" class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Enter your full name" required>
            </div>

            <div>
                <label for="phone" class="mb-2 block text-sm font-medium text-gray-700">Phone number</label>
                <input id="phone" type="tel" class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Enter your phone number" required>
            </div>

            <div>
                <label for="address" class="mb-2 block text-sm font-medium text-gray-700">Address</label>
                <input id="address" type="text" class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Enter your address" required>
            </div>

            <div class="grid gap-4 md:grid-cols-2">
                <div>
                    <label for="city" class="mb-2 block text-sm font-medium text-gray-700">City</label>
                    <input id="city" type="text" class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Enter your city" required>
                </div>

                <div>
                    <label for="state" class="mb-2 block text-sm font-medium text-gray-700">State</label>
                    <input id="state" type="text" class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Enter your state" required>
                </div>
            </div>

            <div>
                <label for="country" class="mb-2 block text-sm font-medium text-gray-700">Country</label>
                <input id="country" type="text" class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Enter your country" required>
            </div>

            <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-3 font-medium text-white transition hover:bg-indigo-700">
                Continue
            </button>
        </form>
    </div>

     <script type="module" src="./../../firebase.js"></script>
    <script type= "module" src="../../JS/SetUp.js"></script>
</body>
</html>
