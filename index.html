<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Board</title>
    <link rel="stylesheet" href="output.css">
    <link rel="icon" href="Assets/job-board.jpg" type="image/jpg">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <div class="navbar flex flex-row items-center justify-between px-10 py-3">
        <div class="title flex flex-row items-center gap-5">
            <img src="Assets/job-board.jpg" alt="" class="h-auto w-9" >
            <h2 class="text-3xl font-bold">Job<span class="text-violet-500">Board</span></h2>
        </div>
        <div class="button flex gap-5">
            <button class="border-1 border-black px-5 py-2 rounded-md cursor-pointer">Login</button>
            <button class="text-white bg-black px-5 py-2 rounded-lg cursor-pointer">Sign-up</button>
        </div>
    </div>
    <!-- hero-section -->
     <div class="hero-section flex flex-row justify-center  gap-10 px-20 mt-30">
        <div class="desc">
            <h1 class="text-5xl font-bold max-w-xl">Find Your Dream Job <span class="block text-violet-500">Build Your Future</span></h1>
            <br>
            <p class="text-gray-600">Discover thousands of job opportunities with top companies and take the next step in your career.</p>
            <br>
            <button class="bg-blue-500 text-white px-5 py-2 rounded text-xl cursor-pointer hover:bg-sky-400 transition-all duration-200 active:bg-blue-500">Browse
                <i class="ri-arrow-down-line"></i>
            </button>
        </div>
        <div class="image">
            <img src="https://imgs.search.brave.com/C-1jJcf0Slg6FHaXwaVbwNm4egeFzZOmPwXsqFNza3I/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93d3cu/c2h1dHRlcnN0b2Nr/LmNvbS9pbWFnZS12/ZWN0b3IvcGVvcGxl/LWpvYi1pbnRlcnZp/ZXctaHItbWFuYWdl/ci02MDBudy0yNDg2/ODg2MzM3LmpwZw" alt = "">
        </div>
     </div>
     <!-- Working-examples-->
    <div class="working-examples mt-30 flex flex-row px-20 gap-10">
        <div class="image">
            <img src="https://images.unsplash.com/photo-1572021335469-31706a17aaef?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt = "" class = "h-auto w-150">
        </div>
</body>
</html>
